<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Gallery | RAGA Wood and Veneer</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="js/components.js"></script>
  <script src="js/main.js" defer></script>
  <style>
    .page-header { background-color: var(--primary); color: white; padding: 120px 0 60px; text-align: center; margin-top: 80px; }
    
    .gallery-masonry {
      column-count: 3;
      column-gap: 20px;
      margin-top: 40px;
    }
    
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 20px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      cursor: zoom-in;
    }
    
    .gallery-item:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-md);
    }
    
    .gallery-item img {
      width: 100%;
      display: block;
    }

    @media (max-width: 992px) {
      .gallery-masonry { column-count: 2; }
    }
    @media (max-width: 576px) {
      .gallery-masonry { column-count: 1; }
    }
  </style>
</head>
<body>
  <app-navbar></app-navbar>

  <section class="page-header">
    <div class="container">
      <h1>Display Gallery</h1>
      <p style="font-size: 1.2rem; opacity: 0.9;">Take a look at our showroom and recent installations.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="gallery-masonry">
        <div class="gallery-item"><img src="assets/images/gallery1.png" alt="Showroom Interior"></div>
        <div class="gallery-item"><img src="assets/images/hero.png" alt="Living Room with Wood Panels"></div>
        <div class="gallery-item"><img src="assets/images/gallery1.png" alt="Showroom Laminates"></div>
        <div class="gallery-item"><img src="assets/images/hero.png" alt="Modern Interior Space"></div>
        <div class="gallery-item"><img src="assets/images/gallery1.png" alt="Showroom Interior Overview"></div>
      </div>
    </div>
  </section>

  <app-footer></app-footer>
</body>
</html>
